<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#1b1046"/>
      <stop offset="52%" stop-color="#0a0620"/>
      <stop offset="100%" stop-color="#02000a"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#f5d0fe"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#f5abfc"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="24" fill="url(#bg)"/>

  <!-- faint starfield specks -->
  <g fill="#c7bcff" opacity=".5">
    <circle cx="24" cy="22" r="1"/><circle cx="78" cy="26" r="1.1"/>
    <circle cx="82" cy="70" r="1"/><circle cx="20" cy="74" r="1.1"/>
    <circle cx="70" cy="16" r=".8"/><circle cx="33" cy="84" r=".8"/>
  </g>

  <!-- wireframe gem / portal into the abyss -->
  <g fill="none" stroke="url(#edge)" filter="url(#glow)" stroke-linejoin="round">
    <polygon points="50,13 82,31.5 82,68.5 50,87 18,68.5 18,31.5" stroke-width="3.2"/>
    <polygon points="50,27 70,38.5 70,61.5 50,73 30,61.5 30,38.5" stroke-width="2" opacity=".85"/>
    <g stroke-width="1.3" opacity=".5">
      <line x1="50" y1="13" x2="50" y2="50"/>
      <line x1="82" y1="31.5" x2="50" y2="50"/>
      <line x1="82" y1="68.5" x2="50" y2="50"/>
      <line x1="50" y1="87" x2="50" y2="50"/>
      <line x1="18" y1="68.5" x2="50" y2="50"/>
      <line x1="18" y1="31.5" x2="50" y2="50"/>
    </g>
  </g>

  <!-- glowing abyssal core -->
  <circle cx="50" cy="50" r="18" fill="url(#core)"/>
  <circle cx="50" cy="50" r="4.2" fill="#ffffff"/>
</svg>
